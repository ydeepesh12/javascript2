<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Async Weather Tracker</h1>
        </header>

        <div class="main-grid">
            <section class="card search-section">
                <h3>Search City</h3>
                <div class="search-box">
                    <input type="text" id="cityInput" placeholder="Enter city name...">
                    <button id="searchBtn">Search</button>
                </div>
                
                <h3>Search History</h3>
                <ul id="historyList"></ul>
            </section>

            <section class="card info-section">
                <h3>Weather Info</h3>
                <div id="weatherDisplay">
                    <p class="placeholder">Search for a city to see weather data.</p>
                </div>
            </section>
        </div>

        <section class="card console-section">
            <h3>Console - Event Loop</h3>
            <div id="consoleOutput" class="console-box"></div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
